# Local development stack for the SaaS evolution work.
# Brings up Postgres, Redis, and Qdrant on conservative defaults.
#
# Not used by the existing API — the prototype still runs against SQLite +
# embedded ChromaDB. This file is wired into application code starting in M1
# (Postgres) and M4 (Qdrant). For M0 it exists only so engineers can spin the
# stack up and confirm the dependencies install and connect.
#
# Usage:
#   cd infra/compose && docker compose -f docker-compose.local.yml up -d
#   docker compose -f docker-compose.local.yml down
#
# Defaults are LOCAL DEV ONLY — credentials are intentionally weak and not
# secured. Do not reuse this compose file in production.

services:
  postgres:
    image: postgres:16-alpine
    container_name: voc_postgres_local
    environment:
      POSTGRES_USER: voc
      POSTGRES_PASSWORD: voc_local_dev
      POSTGRES_DB: voc
    ports:
      - "5432:5432"
    volumes:
      - voc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voc -d voc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: voc_redis_local
    ports:
      - "6379:6379"
    volumes:
      - voc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: voc_qdrant_local
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - voc_qdrant_data:/qdrant/storage
    # The qdrant image does not include curl/wget, but it does ship bash.
    # CMD (exec form) is required so /dev/tcp goes through bash, not /bin/sh
    # (which is dash on Debian and lacks /dev/tcp).
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  voc_postgres_data:
  voc_redis_data:
  voc_qdrant_data:
