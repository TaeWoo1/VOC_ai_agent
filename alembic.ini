# Alembic configuration for the VOC monitoring database.
#
# This file lives at the repo root so `alembic` commands can be invoked from
# anywhere in the project.  Migrations themselves live under the
# `src/voc/persistence/alembic/` directory; see `env.py` there for runtime
# behavior (in particular, the DATABASE_URL environment variable overrides
# the default URL below for production migrations).

[alembic]
script_location = src/voc/persistence/alembic

# Default URL used for local development.  Matches Settings.db_path in
# src/voc/config.py exactly, so `alembic upgrade head` operates on the same
# SQLite file the running app uses (sync stdlib `sqlite3` driver — no extra
# package needed for migrations against SQLite).
#
# Postgres cutover plan (M5): operators set DATABASE_URL to a sync postgres
# URL.  The async runtime driver is `asyncpg` (already declared in pyproject
# `saas` extras); a sync driver for migrations (`psycopg[binary]>=3.1`) is
# NOT yet declared and will be added in the M5 cutover PR alongside the
# managed-Postgres provisioning work.  Until then this default carries us.
sqlalchemy.url = sqlite:///./voc_data.db

# File-template for `alembic revision`: zero-padded version + slug.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Migration timezone reference (UTC for portability).
timezone = UTC

# Path-fragment separator on Windows; harmless elsewhere.
truncate_slug_length = 40

# Output style for `alembic revision --autogenerate` diffs.
output_encoding = utf-8

[post_write_hooks]
# Intentionally empty — no post-write formatting hooks in PR 1.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
